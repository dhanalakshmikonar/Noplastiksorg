{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register | Noplastiks</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>

<body class="auth-body">

<header class="auth-header">
    <a href="{% url 'home' %}" class="logo">NoPlastiks</a>

    {% if user.is_authenticated %}
        <a href="{% url 'logout' %}" class="auth-link">Logout</a>
    {% else %}
        <a href="{% url 'login' %}" class="auth-link">Sign In</a>
    {% endif %}
</header>

<div class="auth-container">
    <h2>Create Account</h2>

    <form method="POST" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Create Account</button>
    </form>

    <p class="auth-footer">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>
</div>

</body>
</html>
